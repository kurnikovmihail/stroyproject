services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stroyproject-api
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-3000}
      AMO_ENABLED: ${AMO_ENABLED:-false}
      AMO_SUBDOMAIN: ${AMO_SUBDOMAIN:-}
      AMO_CLIENT_ID: ${AMO_CLIENT_ID:-}
      AMO_CLIENT_SECRET: ${AMO_CLIENT_SECRET:-}
      AMO_REDIRECT_URI: ${AMO_REDIRECT_URI:-}
      AMO_REFRESH_TOKEN: ${AMO_REFRESH_TOKEN:-}
      AMO_PIPELINE_ID: ${AMO_PIPELINE_ID:-}
      AMO_STATUS_ID: ${AMO_STATUS_ID:-}
      AMO_SOURCE_TAG: ${AMO_SOURCE_TAG:-Сайт stroyproject}
      AMO_TOKEN_STORAGE_PATH: /data/amo-token.json
    volumes:
      - amo_data:/data
    expose:
      - "3000"

  stroyproject:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stroyproject-web
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  amo_data:
