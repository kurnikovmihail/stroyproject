<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Маршрут проектирования</title>
  <desc id="desc">Схема из шести этапов: консультация, анализ, концепция, архитектурный проект, рабочая документация, сопровождение реализации.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#00c4b4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <rect x="80" y="80" width="1440" height="800" rx="28" fill="rgba(17,28,51,0.55)" stroke="rgba(255,255,255,0.16)"/>

  <text x="130" y="155" fill="#e0e0e0" font-size="46" font-family="Montserrat, Manrope, Arial, sans-serif" font-weight="700">
    Маршрут проектирования
  </text>
  <text x="130" y="195" fill="#a7b0c1" font-size="24" font-family="Manrope, Arial, sans-serif">
    От первичной консультации до сопровождения реализации
  </text>

  <line x1="220" y1="500" x2="1380" y2="500" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <g font-family="Manrope, Arial, sans-serif">
    <g transform="translate(140,360)" filter="url(#softShadow)">
      <rect width="210" height="280" rx="20" fill="#16233d" stroke="rgba(255,255,255,0.16)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">01 · Старт</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Консультация</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Сбор вводных, рамка задач</text>
      <circle cx="105" cy="140" r="6" fill="#c9a96e"/>
    </g>

    <g transform="translate(370,320)" filter="url(#softShadow)">
      <rect width="210" height="320" rx="20" fill="#16233d" stroke="rgba(255,255,255,0.16)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">02 · Анализ</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Предпроект</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Участок, ограничения,</text>
      <text x="22" y="154" fill="#a7b0c1" font-size="17">сценарии использования</text>
      <circle cx="105" cy="180" r="6" fill="#c9a96e"/>
    </g>

    <g transform="translate(600,280)" filter="url(#softShadow)">
      <rect width="210" height="360" rx="20" fill="#1b2b47" stroke="rgba(201,169,110,0.55)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">03 · Концепция</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Планировки</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Функциональная логика,</text>
      <text x="22" y="154" fill="#a7b0c1" font-size="17">ключевые решения</text>
      <circle cx="105" cy="220" r="7" fill="#d4af37"/>
    </g>

    <g transform="translate(830,320)" filter="url(#softShadow)">
      <rect width="210" height="320" rx="20" fill="#16233d" stroke="rgba(255,255,255,0.16)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">04 · Архитектура</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Архпроект</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Фасады, объем,</text>
      <text x="22" y="154" fill="#a7b0c1" font-size="17">архитектурная система</text>
      <circle cx="105" cy="180" r="6" fill="#00c4b4"/>
    </g>

    <g transform="translate(1060,360)" filter="url(#softShadow)">
      <rect width="210" height="280" rx="20" fill="#16233d" stroke="rgba(255,255,255,0.16)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">05 · Документация</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Рабочий пакет</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Чертежи, узлы,</text>
      <text x="22" y="154" fill="#a7b0c1" font-size="17">спецификации</text>
      <circle cx="105" cy="140" r="6" fill="#00c4b4"/>
    </g>

    <g transform="translate(1290,320)" filter="url(#softShadow)">
      <rect width="210" height="320" rx="20" fill="#16233d" stroke="rgba(0,196,180,0.5)"/>
      <text x="22" y="44" fill="#c9a96e" font-size="20" font-weight="700">06 · Реализация</text>
      <text x="22" y="84" fill="#e0e0e0" font-size="24" font-weight="700">Сопровождение</text>
      <text x="22" y="128" fill="#a7b0c1" font-size="17">Контроль решений</text>
      <text x="22" y="154" fill="#a7b0c1" font-size="17">на площадке</text>
      <circle cx="105" cy="180" r="7" fill="#00c4b4"/>
    </g>
  </g>
</svg>
